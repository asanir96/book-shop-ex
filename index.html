<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <title>Document</title>
</head>

<body onload="onInit()">
    <div class="content-container">
        <div class="view-select-container">
            <img class="icon table-icon active" src="img/table.svg" alt="" onclick="onChangeView('table')">
            <img class="icon grid-icon" src="img/grid.svg" alt="" onclick="onChangeView('grid')">
            <img class="icon list-icon" src="img/list.svg" alt="" onclick="onChangeView('list')">
        </div>

        <form class="filter">
            <input type="text" name="" id="" placeholder="Filter by Book Title" oninput="onFilter(this)">
        </form>

        <div class="table-container">
        </div>

        <button class="add-btn"
            onclick="onRevealInputRow('.input-row','.add-approve-btn','.add-cancel-btn',this)">+</button>
    </div>
    <dialog class="add-book-form">
        <form method="dialog" onsubmit="onAddBook(this,event)">
            <label for="book-title">Enter a book title:</label>
            <input class="title-input" type="text" id="book-title" required />

            <label for="book-price">Enter the book price:</label>
            <input class="price-input" type="number" id="book-price" required />
            <div class="btn-container">
                <button type="submit" class="add-approve-btn">✓</button>
                <button type="button" class="add-cancel-btn" onclick="onCancelAddBook()">X</button>

            </div>
        </form>
    </dialog>
    <dialog class="details-modal">
        <form method="dialog">
            <h2></h2>
            <img src="" alt="">
            <h3></h3>
            <div class="rate-container"></div>
                <div>
                    <span class="star star-1" onmouseover="onRatingHover(undefined,1)"
                        onclick="onLockRating()">&#9733;</span>
                    <span class="star star-2" onmouseover="onRatingHover(undefined,2)"
                        onclick="onLockRating()">&#9733;</span>
                    <span class="star star-3" onmouseover="onRatingHover(undefined,3)"
                        onclick="onLockRating()">&#9733;</span>
                    <span class="star star-4" onmouseover="onRatingHover(undefined,4)"
                        onclick="onLockRating()">&#9733;</span>
                    <span class="star star-5" onmouseover="onRatingHover(undefined,5)"
                        onclick="onLockRating()">&#9733;</span>
                </div>
                <button class="change-rating-btn"
                    onclick=" onRateChange()">Change Rating</button>
            <button class="modal-close-btn"
                onclick="hideRatingAction('.rate-action-btn','.rate-plus-btn','.rate-minus-btn','.rate-numbers-container',event)">x</button>
        </form>
    </dialog>
    <div class="success-message">

    </div>
    <script src="js/services/storage.service.js"></script>
    <script src="js/services/util.service.js"></script>
    <script src="js/services/book.service.js"></script>
    <script src="js/controller/controller.js"></script>

</body>

</html>
