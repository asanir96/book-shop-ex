<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <title>Document</title>
</head>

<body onload="onInit()">
    <div class="content-container">
        <div class="view-select-container">
            <img class="icon table-icon active" src="img/table.svg" alt="" onclick="onChangeView('table')">
            <img class="icon grid-icon" src="img/grid.svg" alt="" onclick="onChangeView('grid')">
            <img class="icon list-icon" src="img/list.svg" alt="" onclick="onChangeView('list')">
        </div>
        <fieldset class="filter">
            <legend>
                Filter
            </legend>
            <div class="by-title">
                <label for="by-title"></label>
                <input class="filter-by-title" type="text" name="" id="by-title" placeholder="Filter By Title"
                    oninput="onSetFilter()" size="1">
            </div>
            <div class="by-rating">
                <label for="by-rating">Filter Min Rating</label>
                <select name="" id="by-rating" onchange="onSetFilter()" class="filter-by-rating">
                    <option value="0"></option>
                    <option value="1">&#9733;</option>
                    <option value="2">&#9733;&#9733;</option>
                    <option value="3">&#9733;&#9733;&#9733;</option>
                    <option value="4">&#9733;&#9733;&#9733;</option>
                    <option value="5">&#9733;&#9733;&#9733;&#9733;</option>
                </select>
            </div>
            <button onclick="onClearFilter()">Clear</button>

        </fieldset>
        <fieldset class="sort">
            <legend>
                Sort
            </legend>

            <div class="sort-by">
                <label for="by-rating">Sort</label>
                <select name="" id="by-rating" onchange="onSetSortBy()">
                    <option value=""></option>
                    <option value="title">By Title</option>
                    <option value="price">By Price</option>
                    <option value="rating">By Rating</option>
                </select>
            </div>

            <form onchange="onSetSortBy()" class="sort-direction">
                <label for="sort-ascend">Ascending</label>
                <input class="sort-ascend" type="radio" value='ascend' name="sort-direction" id="sort-ascend">
                <label for="sort-descend">Descending</label>
                <input class="sort-descend" type="radio" value='descend' name="sort-direction" id="sort-descend">
            </form>
            <button onclick="onClearSortBy()">Clear</button>
        </fieldset>
        <div class="data-container">
        </div>

        <div class="pagination">
            <button class="pagination-btn" onclick="onPrevPage()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor"
                    class="bi bi-caret-left-square" viewBox="0 0 16 16">
                    <path
                        d="M14 1a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1zM2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2z" />
                    <path
                        d="M10.205 12.456A.5.5 0 0 0 10.5 12V4a.5.5 0 0 0-.832-.374l-4.5 4a.5.5 0 0 0 0 .748l4.5 4a.5.5 0 0 0 .537.082" />
                </svg>
            </button>
            <div class="pagination-state">
                1</div>
            <button class="pagination-btn" onclick="onNextPage()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor"
                    class="bi bi-caret-right-square" viewBox="0 0 16 16">
                    <path
                        d="M14 1a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1zM2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2z" />
                    <path
                        d="M5.795 12.456A.5.5 0 0 1 5.5 12V4a.5.5 0 0 1 .832-.374l4.5 4a.5.5 0 0 1 0 .748l-4.5 4a.5.5 0 0 1-.537.082" />
                </svg>
            </button>
        </div>
        <button class="add-btn" onclick="onRevealInputRow('.input-row','.add-approve-btn','.add-cancel-btn',this)">
            <svg fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M3 8v11c0 2.201 1.794 3 3 3h15v-2H6.012C5.55 19.988 5 19.806 5 19c0-.101.009-.191.024-.273.112-.576.584-.717.988-.727H21V4c0-1.103-.897-2-2-2H6c-1.206 0-3 .799-3 3v3zm3-4h13v12H5V5c0-.806.55-.988 1-1z" />
                <path d="M11 14h2v-3h3V9h-3V6h-2v3H8v2h3z" />
            </svg>
        </button>
    </div>
    <dialog class="add-book-form">
        <form method="dialog" onsubmit="onAddBook(this,event)">
            <label for="book-title">Enter a book title:</label>
            <input class="title-input" type="text" id="book-title" required />

            <label for="book-price">Enter the book price:</label>
            <input class="price-input" type="number" id="book-price" required />
            <div class="btn-container">
                <button type="submit" class="add-approve-btn">✓</button>
                <button type="button" class="add-cancel-btn" onclick="onCancelAddBook()">X</button>

            </div>
        </form>
    </dialog>
    <dialog class="details-modal">
        <form method="dialog">
            <h2></h2>
            <img src="" alt="">
            <h3></h3>
            <div class="rate-container"></div>
            <div>
                <span class="star star-1" onmouseover="onRatingHover(undefined,1)"
                    onclick="onLockRating()">&#9733;</span>
                <span class="star star-2" onmouseover="onRatingHover(undefined,2)"
                    onclick="onLockRating()">&#9733;</span>
                <span class="star star-3" onmouseover="onRatingHover(undefined,3)"
                    onclick="onLockRating()">&#9733;</span>
                <span class="star star-4" onmouseover="onRatingHover(undefined,4)"
                    onclick="onLockRating()">&#9733;</span>
                <span class="star star-5" onmouseover="onRatingHover(undefined,5)"
                    onclick="onLockRating()">&#9733;</span>
            </div>
            <button class="change-rating-btn" onclick=" onRateChange()">Change Rating</button>
            <button class="modal-close-btn"
                onclick="hideRatingAction('.rate-action-btn','.rate-plus-btn','.rate-minus-btn','.rate-numbers-container',event)">x</button>
        </form>
    </dialog>
    <div class="success-message">

    </div>
    <script src="js/services/storage.service.js"></script>
    <script src="js/services/util.service.js"></script>
    <script src="js/services/book.service.js"></script>
    <script src="js/controller/controller.js"></script>

</body>

</html>
