<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <title>Document</title>
</head>

<body onload="onInit()">
    <div class="table-container">
        <form class="filter">
            <input type="text" name="" id="" placeholder="Filter by Book Title" oninput="onFilter(this)">
        </form>
        <table>
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
        <button class="add-btn"
            onclick="onRevealInputRow('.input-row','.add-approve-btn','.add-cancel-btn',this)">+</button>
        <button class="add-approve-btn" onclick="onAddBook('.title-input','.price-input')">✓</button>
        <button class="add-cancel-btn" onclick="onCancelAddBook()">X</button>
    </div>
    <dialog class="details-modal">
        <form method="dialog">
            <h2></h2>
            <img src="" alt="">
            <h3></h3>
            <div class="rate-container">
                <button class="rate-plus-btn" onclick="onRateChange(1,'.rate-numbers-container',event)">
                    <div class="rate-plus-inner">
                        <div class="plus-sign-horizontal">

                        </div>
                        <div class="plus-sign-vertical">

                        </div>
                    </div>
                </button>
                <div class="rate-numbers-container">0 </div>
                <button class="rate-minus-btn" onclick="onRateChange(-1,'.rate-numbers-container',event)">
                    <div class="rate-plus-inner">

                        <div class="minus-sign">

                        </div>
                    </div>
                </button>
            </div>
            <button class="rate-action-btn"
                onclick="onShowRatingBtn(this,'.rate-plus-btn','.rate-minus-btn','.rate-numbers-container',event)">Rate
                this Book</button>
            <button class="modal-close-btn"
                onclick="hideRatingAction('.rate-action-btn','.rate-plus-btn','.rate-minus-btn','.rate-numbers-container',event)">x</button>
        </form>
    </dialog>
    <div class="success-message">

    </div>
    <script src="js/services/storage.service.js"></script>
    <script src="js/services/util.service.js"></script>
    <script src="js/services/book.service.js"></script>
    <script src="js/controller/controller.js"></script>

</body>

</html>
